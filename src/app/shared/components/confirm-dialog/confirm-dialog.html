<h2 mat-dialog-title>

    {{ data.title }}

</h2>

<mat-dialog-content>

    <p class="message">

        {{ data.message }}

    </p>

</mat-dialog-content>

<mat-dialog-actions align="end">

    <button
        mat-button
        (click)="cancelar()">

        {{ data.cancelText ?? 'Cancelar' }}

    </button>

    <button
        mat-raised-button
        color="warn"
        (click)="confirmar()">

        {{ data.confirmText ?? 'Confirmar' }}

    </button>

</mat-dialog-actions>
