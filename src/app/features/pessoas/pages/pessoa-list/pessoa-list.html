<h1>
  Pessoas
</h1>


<button
  mat-raised-button
  color="primary"
  (click)="novaPessoa()"
>
  Nova pessoa
</button>


<table
  mat-table
  [dataSource]="pessoas"
  class="mat-elevation-z8"
>


  <!-- Nome -->
  <ng-container matColumnDef="nome">

    <th
      mat-header-cell
      *matHeaderCellDef
    >
      Nome
    </th>


    <td
      mat-cell
      *matCellDef="let pessoa"
    >
      {{ pessoa.nome }}
    </td>

  </ng-container>



  <!-- CPF -->
  <ng-container matColumnDef="cpf">

    <th
      mat-header-cell
      *matHeaderCellDef
    >
      CPF
    </th>


    <td
      mat-cell
      *matCellDef="let pessoa"
    >
      {{ pessoa.cpf }}
    </td>

  </ng-container>



  <!-- Email -->
  <ng-container matColumnDef="email">

    <th
      mat-header-cell
      *matHeaderCellDef
    >
      Email
    </th>


    <td
      mat-cell
      *matCellDef="let pessoa"
    >
      {{ pessoa.email }}
    </td>

  </ng-container>



  <!-- Ações -->
  <ng-container matColumnDef="acoes">

    <th
      mat-header-cell
      *matHeaderCellDef
    >
      Ações
    </th>


    <td
      mat-cell
      *matCellDef="let pessoa"
    >

      <button
        mat-button
      >
        Editar
      </button>


      <button
        mat-button
        color="warn"
      >
        Desativar
      </button>

    </td>

  </ng-container>



  <!-- Header -->
  <tr
    mat-header-row
    *matHeaderRowDef="columns"
  >
  </tr>


  <!-- Rows -->
  <tr
    mat-row
    *matRowDef="let row; columns: columns;"
  >
  </tr>


</table>
