<mat-card class="address-card">

    <div class="header">

        <h3>
            Endereço {{ index + 1 }}
        </h3>

        @if(canRemove){

        <button mat-icon-button color="warn" (click)="remover()">

            <mat-icon>
                delete
            </mat-icon>

        </button>

        }

    </div>

    <div class="grid" [formGroup]="form">

        <mat-form-field appearance="outline" class="full">

            <mat-label>
                Tipo
            </mat-label>
            <mat-select formControlName="tipo">

                <mat-option [value]="TipoEndereco.PRINCIPAL">
                    Principal
                </mat-option>

                <mat-option [value]="TipoEndereco.COMERCIAL">
                    Comercial
                </mat-option>

                <mat-option [value]="TipoEndereco.ENTREGA">
                    Entrega
                </mat-option>

            </mat-select>

        </mat-form-field>


        <mat-form-field appearance="outline">

            <mat-label>CEP</mat-label>

            <input matInput maxlength="9" formControlName="codigoPostal">

            <button mat-icon-button matSuffix type="button" [disabled]="loading" (click)="buscar()">

                @if(loading){

                <mat-icon>hourglass_top</mat-icon>

                } @else {

                <mat-icon>search</mat-icon>

                }

            </button>

        </mat-form-field>


        <div></div>


        <mat-form-field appearance="outline" class="full">

            <mat-label>
                Logradouro
            </mat-label>

            <input matInput readonly formControlName="logradouro">

        </mat-form-field>

        <mat-form-field appearance="outline">

            <mat-label>
                Número
            </mat-label>

            <input matInput formControlName="numero">

        </mat-form-field>


        <mat-form-field appearance="outline">

            <mat-label>
                Complemento
            </mat-label>

            <input matInput formControlName="complemento">

        </mat-form-field>


        <mat-form-field appearance="outline" class="full">

            <mat-label>
                Bairro
            </mat-label>

            <input matInput readonly formControlName="bairro">

        </mat-form-field>


        <mat-form-field appearance="outline">

            <mat-label>
                Município
            </mat-label>

            <input matInput readonly formControlName="municipio">

        </mat-form-field>


        <mat-form-field appearance="outline">

            <mat-label>
                Estado
            </mat-label>

            <input matInput readonly formControlName="estado">

        </mat-form-field>

    </div>

</mat-card>
